# RobotTwin — 3-DOF arm parameters.
# Single source of truth: simulation, visualization, CAD, and firmware all read this file.
# Units are human-friendly here (mm, deg, g, RPM); loaders convert to SI (m, rad, kg).
# Geometry is FIXED (see docs/linkage-geometry.md). Gearboxes are the independent variables.

robot:
  name: rt-arm-3dof

links:
  base_height_mm: 90     # table -> shoulder pitch axis
  upper_arm_mm: 120      # shoulder axis -> elbow axis
  forearm_mm: 120        # elbow axis -> TCP (gripper grasp point)

joints:
  base:
    limits_deg: [-135, 135]
  shoulder:
    limits_deg: [0, 180]     # from horizontal, positive up
  elbow:
    limits_deg: [-150, 150]  # 0 = straight arm (singular boundary)

# Mass model (PETG ~30% infill estimates + purchased hardware)
masses:
  upper_arm_g: 160
  forearm_g: 120
  elbow_motor_g: 350       # NEMA 17 mounted at the elbow joint
  gripper_g: 90            # at TCP
  payload_default_g: 100
  payload_max_g: 2000

# All three joints use the same motor (NEMA 17, 42x48)
motor:
  holding_torque_nm: 0.45
  max_speed_rpm: 600         # usable ceiling before torque collapse
  rotor_inertia_g_cm2: 57
  step_angle_deg: 1.8
  microstepping: 16

# Gearboxes — THE independent variables of the twin: drive type + reduction
# ratio per joint. Everything else (efficiency, backlash, torque cap, inertia)
# is derived from the gearbox_models below. These are power-on defaults; the
# interactive UI overrides them live.
gearboxes:
  base:
    type: planetary
    ratio: 5
  shoulder:
    type: cycloidal
    ratio: 15
  elbow:
    type: planetary
    ratio: 5

# Characteristic models for each printable drive type. A planetary stage tops
# out around 6:1, so higher ratios stack stages and compound their losses and
# backlash. Cycloidal backlash is negligible by design assumption.
gearbox_models:
  direct:
    ratio_range: [1, 1]
    efficiency: 0.98
    backlash_deg: 0.02       # shaft coupling only
    max_torque_nm: 10.0      # no printed gears in the path
    inertia_g_cm2: 0
  planetary:
    ratio_range: [2, 25]
    max_stage_ratio: 6
    stage_efficiency: 0.88
    stage_backlash_deg: 0.6
    max_torque_nm: 3.5       # printed-gear strength cap
    stage_inertia_g_cm2: 12
  cycloidal:
    ratio_range: [8, 40]
    efficiency: 0.75
    backlash_deg: 0.0        # negligible by design assumption
    max_torque_nm: 8.0
    inertia_g_cm2: 25

# Collision geometry — conservative capsule/sphere envelopes around the real
# parts. Used to block commands that would self-collide or strike the table.
collision:
  ground_clearance_mm: 5      # minimum gap kept between any link and the table
  column_radius_mm: 34        # rotating column + base motor envelope
  column_top_mm: 70           # column capsule spans z = 0 .. this
  base_radius_mm: 78          # stationary base housing envelope
  base_top_mm: 62
  shoulder_radius_mm: 42      # shoulder joint + motor block envelope
  upper_arm_radius_mm: 26
  forearm_radius_mm: 22
  gripper_extent_mm: 32       # gripper reach beyond the TCP along the forearm
  elbow_trim: 0.2             # forearm fraction ignored next to its own elbow joint

# Standard mechanical components the design is built around
hardware:
  bearing: "608 (8x22x7 mm)"
  shaft_mm: 8
  motor_frame: "NEMA 17 42.3x42.3x48 mm"
  printer: "Bambu Lab A1 Mini"
  build_volume_mm: [180, 180, 180]
