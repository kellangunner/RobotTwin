; RobotTwin firmware — ESP32 + 3x TMC2209 stepper drivers.
; ESP-IDF (not Arduino) because the core library is C++20 and IDF ships GCC 12+.
;
;   pio run                 # build
;   pio run -t upload       # flash (auto-detects the serial port)
;   pio device monitor      # protocol console at 115200 baud
[env:esp32dev]
platform = espressif32@^6.7.0
board = esp32dev
framework = espidf
monitor_speed = 115200
monitor_eol = LF
monitor_filters = direct
